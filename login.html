<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | APUSH Learning Hub</title>
    <link rel="stylesheet" href="styles.css">

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f6fb;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .login-card {
            background: white;
            padding: 40px;
            width: 350px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            background: #2563eb;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #1e4fd1;
        }

        .links {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }

        .links a {
            color: #2563eb;
            cursor: pointer;
            margin: 0 5px;
        }
    </style>
</head>

<body>

    <div class="login-card">

        <h1>APUSH Hub</h1>

        <form id="login-form">
            <input type="email" id="email" placeholder="Email address" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Sign In</button>
        </form>

        <div class="links">
            <a id="create-account">Create Account</a> |
            <a id="forgot-password">Forgot Password</a>
        </div>

    </div>

    <script>
        /////////////////////////////
        // Simple Auth System
        /////////////////////////////

        const AuthManager = {
            getUsers() {
                return JSON.parse(localStorage.getItem("apush_users")) || [];
            },

            saveUsers(users) {
                localStorage.setItem("apush_users", JSON.stringify(users));
            },

            createAccount(email, password) {
                let users = this.getUsers();

                if (users.find(u => u.email === email)) {
                    throw new Error("Account already exists");
                }

                const newUser = {
                    id: Date.now(),
                    email: email,
                    password: password
                };

                users.push(newUser);
                this.saveUsers(users);
            },

            login(email, password) {
                let users = this.getUsers();

                const user = users.find(u => u.email === email && u.password === password);

                if (!user) {
                    throw new Error("Invalid email or password");
                }

                localStorage.setItem("apush_current_user", JSON.stringify(user));
            },

            logout() {
                localStorage.removeItem("apush_current_user");
            },

            getCurrentUser() {
                return JSON.parse(localStorage.getItem("apush_current_user"));
            },

            resetPassword(email, newPassword) {
                let users = this.getUsers();
                let user = users.find(u => u.email === email);

                if (!user) {
                    throw new Error("Account not found");
                }

                user.password = newPassword;
                this.saveUsers(users);
            }
        };

        /////////////////////////////
        // LOGIN
        /////////////////////////////

        document.getElementById("login-form").addEventListener("submit", function (e) {
            e.preventDefault();

            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            try {
                AuthManager.login(email, password);
                alert("Login successful!");
                window.location.href = "index.html";
            } catch (err) {
                alert(err.message);
            }
        });

        /////////////////////////////
        // CREATE ACCOUNT
        /////////////////////////////

        document.getElementById("create-account").addEventListener("click", () => {
            const email = prompt("Enter your email");
            if (!email) return;

            const password = prompt("Create a password (min 6 characters)");
            if (!password || password.length < 6) {
                alert("Password must be at least 6 characters");
                return;
            }

            try {
                AuthManager.createAccount(email, password);
                alert("Account created! You can now sign in.");
            } catch (err) {
                alert(err.message);
            }
        });

        /////////////////////////////
        // FORGOT PASSWORD
        /////////////////////////////

        document.getElementById("forgot-password").addEventListener("click", () => {
            const email = prompt("Enter your email");
            if (!email) return;

            const newPassword = prompt("Enter a new password");
            if (!newPassword || newPassword.length < 6) {
                alert("Password must be at least 6 characters");
                return;
            }

            try {
                AuthManager.resetPassword(email, newPassword);
                alert("Password reset successful!");
            } catch (err) {
                alert(err.message);
            }
        });

        /////////////////////////////
        // LOGOUT FUNCTION
        /////////////////////////////

        function logout() {
            AuthManager.logout();
            window.location.href = "login.html";
        }
    </script>

</body>
</html>
